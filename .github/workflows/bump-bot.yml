name: Bump Bot

on:
  workflow_run:
    workflows:
      - Package Bot
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bump-main
  cancel-in-progress: true

jobs:
  bump-version:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.actor.login != 'github-actions[bot]' &&
        !startsWith(github.event.workflow_run.head_commit.message || '', 'Bump version') &&
        !contains(github.event.workflow_run.head_commit.message || '', '[no-bump]')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bump tool
        run: python -m pip install --upgrade pip bump2version

      - name: Bump patch version
        run: bump2version patch --allow-dirty --no-commit --no-tag

      - name: Commit and tag bump
        run: |
          if git diff --quiet; then
            echo "No bump changes found."
            exit 0
          fi

          NEW_VERSION="$(cat VERSION)"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add VERSION choppa/__init__.py setup.cfg
          git commit -m "Bump version"
          git tag "v${NEW_VERSION}"
          git push origin HEAD:main --follow-tags
